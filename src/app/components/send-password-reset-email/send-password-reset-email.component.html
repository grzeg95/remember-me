<form [formGroup]="_recoveryForm">

  <div class="input-group email">
    <app-input
      label="Email"
      formControlName="email"
      type="email"
    />
    @if (!_recoveryForm.disabled && !_email?.valid && !_email?.untouched) {
      <span class="input-error">Enter email</span>
    }
  </div>

  <mat-progress-bar [style.opacity]="_recoveryForm.disabled ? '1' : '0'" mode="indeterminate"></mat-progress-bar>

  <div class="action-buttons">
    <button
      app-button
      appearance="primary"
      [disabled]="_recoveryForm.disabled || _recoveryForm.invalid || !_isOnline()"
      (click)="sendPasswordResetEmail()">Send password reset email</button>
  </div>

</form>
